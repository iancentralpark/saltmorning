<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Parent — Salt Morning Class</title>
  <link rel="stylesheet" href="/css/app.css?v=20260708libs">
</head>
<body>
<div class="shell">
  <div id="loginView" class="card">
    <h2>Parent login</h2>
    <form id="loginForm" class="form-grid">
      <input id="loginId" placeholder="Login ID" autocomplete="username" required>
      <input id="password" type="password" placeholder="Password" autocomplete="current-password" required>
      <div class="error" id="loginError"></div>
      <button class="btn btn-primary btn-block" type="submit">Sign in</button>
      <a href="/">← Back</a>
    </form>
  </div>

  <div id="appView" class="hidden">
    <div class="topbar">
      <div class="brand" id="welcomeText">Parent</div>
      <button class="btn btn-ghost" id="logoutBtn" type="button">Log out</button>
    </div>
    <div id="tabAnnouncements" class="card">
      <div id="announceList"></div>
    </div>
  </div>
</div>
<script src="/socket.io/socket.io.js"></script>
<script src="/js/app.js"></script>
<script src="/js/messenger.js?v=20260708libs"></script>
<script>
(function() {
  const role = 'parent';
  const { api, getToken, setToken, getProfile, setProfile, $, show, hide, escapeHtml } = SaltApp;

  async function loadAnnouncements() {
    const data = await api('/api/parent/announcements', {}, role);
    $('announceList').innerHTML = (data.announcements || []).map(a =>
      '<div style="margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid var(--border)">' +
      '<strong>' + escapeHtml(a.title) + '</strong>' +
      '<div style="color:var(--muted);font-size:.8rem;margin:.25rem 0">' + escapeHtml(a.postedAt) + '</div>' +
      '<div>' + escapeHtml(a.body) + '</div></div>'
    ).join('') || '<p style="color:var(--muted)">No announcements yet.</p>';
  }

  $('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    $('loginError').textContent = '';
    try {
      const data = await api('/api/auth/parent/login', {
        method: 'POST',
        body: { loginId: $('loginId').value, password: $('password').value }
      });
      setToken(role, data.token);
      setProfile(role, data.profile);
      bootApp();
    } catch (err) { $('loginError').textContent = err.message; }
  });

  $('logoutBtn').addEventListener('click', () => {
    setToken(role, ''); setProfile(role, null); location.reload();
  });

  function bootApp() {
    const p = getProfile(role);
    if (!p) return;
    hide($('loginView')); show($('appView'));
    $('welcomeText').textContent = 'Hi, ' + p.name;
    loadAnnouncements();
    SaltMessenger.init(role);
  }

  if (getToken(role)) bootApp();
})();
</script>
</body>
</html>
