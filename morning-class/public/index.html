<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Salt Academy Morning Class</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <div class="landing">
    <h1>Salt Academy</h1>
    <p>Morning Class Portal</p>
    <div class="choice-grid">
      <button type="button" class="choice-btn choice-student" onclick="location.href='/student'">
        <span class="icon">🎓</span>
        <span>
          <span class="choice-label">I am a student</span>
          <span class="choice-hint">Homework, AI buddy &amp; messages</span>
        </span>
      </button>
      <button type="button" class="choice-btn choice-parent" onclick="location.href='/parent'">
        <span class="icon">👪</span>
        <span>
          <span class="choice-label">I am a parent</span>
          <span class="choice-hint">Announcements &amp; teacher messages</span>
        </span>
      </button>
      <button type="button" class="choice-btn choice-teacher" onclick="location.href='/teacher'">
        <span class="icon">📋</span>
        <span>
          <span class="choice-label">I am a teacher</span>
          <span class="choice-hint">Classes, grades &amp; lesson plans</span>
        </span>
      </button>
    </div>
  </div>
</body>
</html>
