                <button type="button" class="btn-remove-winner" id="removeWinnerBtn">Remove</button>

    <script>
        const CLASS_NAME = <?!= classNameJson ?>;
        const INITIAL_STUDENTS = <?!= studentsJson ?>;

        const MR_PARK_LABEL = 'Mr. Park';

        const SEGMENT_COLORS = [
            '#3b9edd', '#5dade2', '#ff9f43', '#ffb347',
            '#ff6b9d', '#2ecc71', '#58d68d', '#f39c12',
            '#85c1e9', '#fd79a8', '#ffeaa7', '#74b9ff'
        ];

        let entries = [];
        let rotation = 0;
        let spinning = false;
        let animId = null;
        let lastWinnerIndex = -1;

        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const dpr = window.devicePixelRatio || 1;

        function uid() {
            return 'u_' + Date.now() + '_' + Math.random().toString(36).slice(2, 9);
        }

        function studentsToEntries(students) {
            return (students || []).map(function(s) {
                return { uid: uid(), id: s.id || '', label: (s.name || '').trim() || 'Student' };
            }).filter(function(e) { return e.label; });
        }

        function buildDefaultEntries(students) {
            const list = studentsToEntries(students);
            list.push({ uid: uid(), id: 'mr_park', label: MR_PARK_LABEL });
            return list;
        }

        function resizeCanvas() {
            const box = canvas.parentElement;
            const size = Math.min(box.clientWidth, 420);
            canvas.style.width = size + 'px';
            canvas.style.height = size + 'px';
            canvas.width = Math.floor(size * dpr);
            canvas.height = Math.floor(size * dpr);
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            drawWheel();
        }

        function drawWheel() {
            const size = canvas.width / dpr;
            const cx = size / 2;
            const cy = size / 2;
            const r = size / 2 - 8;

            ctx.clearRect(0, 0, size, size);
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate((rotation * Math.PI) / 180);

            const n = entries.length;
            if (n === 0) {
                ctx.beginPath();
                ctx.arc(0, 0, r, 0, Math.PI * 2);
                ctx.fillStyle = '#e2e8f0';
                ctx.fill();
                ctx.fillStyle = '#94a3b8';
                ctx.font = '600 14px Fredoka, Nunito, sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('Add students →', 0, 0);
                ctx.restore();
                return;
            }

            const slice = (Math.PI * 2) / n;
            for (let i = 0; i < n; i++) {
                const start = i * slice - Math.PI / 2;
                const end = start + slice;
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.arc(0, 0, r, start, end);
                ctx.closePath();
                ctx.fillStyle = SEGMENT_COLORS[i % SEGMENT_COLORS.length];
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.85)';
                ctx.lineWidth = 2;
                ctx.stroke();

                drawRadialLabel(entries[i].label, start + slice / 2, r, n);
            }

            ctx.beginPath();
            ctx.arc(0, 0, r * 0.12, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
            ctx.restore();
        }

        /**
         * Reference-style radial labels, placed on the outer (wider) part of each slice
         * so font can stay larger even with many segments.
         */
        function drawRadialLabel(label, mid, radius, n) {
            const raw = (label || '').trim();
            if (!raw) return;

            const slice = (Math.PI * 2) / n;
            const hubClear = radius * 0.20;
            const textOuterR = radius * 0.91;
            const textAnchorR = textOuterR - 5;

            const arcAvail = 2 * textAnchorR * Math.sin(slice / 2) * 0.94;
            const radialAvail = textAnchorR - hubClear - 6;
            const maxWidth = Math.min(arcAvail, radialAvail);

            let fontSize = Math.min(18, Math.max(9, arcAvail * 0.52));
            let text = raw;

            ctx.fillStyle = '#fff';
            ctx.textAlign = 'right';
            ctx.textBaseline = 'middle';

            function setFont() {
                ctx.font = '700 ' + fontSize + 'px Fredoka, Nunito, sans-serif';
            }

            setFont();
            let textW = ctx.measureText(text).width;

            while (textW > maxWidth && fontSize > 7) {
                fontSize -= 0.5;
                setFont();
                textW = ctx.measureText(text).width;
            }

            if (textW > maxWidth) {
                let lo = 1;
                let hi = raw.length;
                setFont();
                while (lo < hi) {
                    const midLen = Math.ceil((lo + hi) / 2);
                    const candidate = raw.slice(0, midLen) + '…';
                    if (ctx.measureText(candidate).width <= maxWidth) {
                        lo = midLen;
                    } else {
                        hi = midLen - 1;
                    }
                }
                text = raw.slice(0, Math.max(1, lo - 1)) + '…';
                setFont();
            }

            ctx.save();
            ctx.translate(Math.cos(mid) * textAnchorR, Math.sin(mid) * textAnchorR);
            ctx.rotate(mid);
            ctx.shadowColor = 'rgba(30, 27, 75, 0.35)';
            ctx.shadowBlur = 2;
            ctx.fillText(text, 0, 0);
            ctx.shadowBlur = 0;
            ctx.restore();
        }

        function indexAtPointer(degRot) {
            const n = entries.length;
            if (n === 0) return -1;
            const slice = 360 / n;
            const norm = ((360 - (degRot % 360)) % 360);
            return Math.floor(norm / slice) % n;
        }

        /** Landing point within a slice — biased toward edges, not dead center. */
        function pickLandingOffset(sliceDeg) {
            const r = Math.random();
            if (r < 0.38) {
                return sliceDeg * (0.05 + Math.random() * 0.14);
            }
            if (r < 0.76) {
                return sliceDeg * (0.81 + Math.random() * 0.13);
            }
            return sliceDeg * (0.32 + Math.random() * 0.36);
        }

        /** Fast start, long slow finish — builds suspense near the end. */
        function easeOutSpin(t) {
            return 1 - Math.pow(1 - t, 4.8);
        }

        function spin() {
            if (spinning || entries.length < 2) return;
            spinning = true;
            document.getElementById('spinBtn').disabled = true;

            const n = entries.length;
            const slice = 360 / n;
            const winIndex = Math.floor(Math.random() * n);
            lastWinnerIndex = winIndex;

            const landingOffset = pickLandingOffset(slice);
            const landingAngle = winIndex * slice + landingOffset;

            const targetMod = (360 - landingAngle) % 360;
            const currentMod = ((rotation % 360) + 360) % 360;
            let delta = (targetMod - currentMod + 360) % 360;
            if (delta < 45) delta += 360;

            const extraSpins = 6 + Math.floor(Math.random() * 3);
            const finalRotation = rotation + extraSpins * 360 + delta;

            const nearUpperEdge = landingOffset > slice * 0.78;
            const useOvershoot = nearUpperEdge && Math.random() < 0.55;
            const overshootDeg = useOvershoot
                ? slice * (0.02 + Math.random() * 0.05)
                : 0;
            const peakRotation = finalRotation + overshootDeg;

            const startRot = rotation;
            const duration = 7200 + Math.random() * 1800;
            const startTime = performance.now();
            const settleStart = 0.84;

            function frame(now) {
                const t = Math.min(1, (now - startTime) / duration);
                let rot;

                if (useOvershoot) {
                    if (t < settleStart) {
                        const p = easeOutSpin(t / settleStart);
                        rot = startRot + (peakRotation - startRot) * p;
                    } else {
                        const st = (t - settleStart) / (1 - settleStart);
                        const settle = 1 - Math.pow(1 - st, 3.2);
                        rot = peakRotation - overshootDeg * settle;
                    }
                } else {
                    rot = startRot + (finalRotation - startRot) * easeOutSpin(t);
                }

                if (t > 0.93 && t < 1) {
                    rot += Math.sin((t - 0.93) * 55) * (1 - t) * 1.8;
                }

                rotation = rot;
                drawWheel();

                if (t < 1) {
                    animId = requestAnimationFrame(frame);
                } else {
                    rotation = finalRotation;
                    drawWheel();
                    const idx = indexAtPointer(rotation);
                    lastWinnerIndex = idx >= 0 ? idx : winIndex;
                    spinning = false;
                    document.getElementById('spinBtn').disabled = entries.length < 2;
                    showWinner(entries[lastWinnerIndex]);
                }
            }
            if (animId) cancelAnimationFrame(animId);
            animId = requestAnimationFrame(frame);
        }

        function showWinner(entry) {
            if (!entry) return;
            document.getElementById('winnerName').textContent = entry.label;
            document.getElementById('winnerOverlay').classList.add('show');
        }

        function hideWinner() {
            document.getElementById('winnerOverlay').classList.remove('show');
        }

        function removeWinnerFromWheel() {
            if (lastWinnerIndex >= 0 && lastWinnerIndex < entries.length) {
                entries.splice(lastWinnerIndex, 1);
                lastWinnerIndex = -1;
                syncSidebar();
                drawWheel();
                updateSpinState();
            }
            hideWinner();
        }

        function syncSidebar() {
            const list = document.getElementById('entryList');
            list.innerHTML = '';
            if (entries.length === 0) {
                list.innerHTML = '<div class="empty-msg">No names on the wheel.<br>Add students or use Reset list.</div>';
            } else {
                entries.forEach(function(entry, i) {
                    const row = document.createElement('div');
                    row.className = 'entry-item';
                    row.innerHTML =
                        '<input type="text" value="" data-idx="' + i + '">' +
                        '<button type="button" class="btn-rm" title="Remove" data-idx="' + i + '"><i class="fa-solid fa-xmark"></i></button>';
                    const input = row.querySelector('input');
                    input.value = entry.label;
                    input.addEventListener('input', function() {
                        entries[i].label = input.value.trim() || '—';
                        drawWheel();
                    });
                    row.querySelector('.btn-rm').addEventListener('click', function() {
                        entries.splice(i, 1);
                        syncSidebar();
                        drawWheel();
                        updateSpinState();
                    });
                    list.appendChild(row);
                });
            }
            document.getElementById('countHint').textContent = entries.length + ' on wheel';
        }

        function updateSpinState() {
            document.getElementById('spinBtn').disabled = spinning || entries.length < 2;
            document.getElementById('x2Btn').disabled = spinning || entries.length === 0;
        }

        function duplicateX2() {
            if (entries.length === 0 || spinning) return;
            const copies = entries.map(function(e) {
                return { uid: uid(), id: e.id, label: e.label };
            });
            entries = entries.concat(copies);
            syncSidebar();
            drawWheel();
            updateSpinState();
        }

        function addEntry() {
            const input = document.getElementById('addNameInput');
            const name = (input.value || '').trim();
            if (!name) return;
            entries.push({ uid: uid(), id: '', label: name });
            input.value = '';
            syncSidebar();
            drawWheel();
            updateSpinState();
        }

        function resetList() {
            if (spinning) return;
            entries = buildDefaultEntries(INITIAL_STUDENTS);
            lastWinnerIndex = -1;
            syncSidebar();
            drawWheel();
            updateSpinState();
        }

        document.getElementById('classSubtitle').textContent = CLASS_NAME;
        document.getElementById('spinBtn').addEventListener('click', spin);
        document.getElementById('x2Btn').addEventListener('click', duplicateX2);
        document.getElementById('resetListBtn').addEventListener('click', resetList);
        document.getElementById('addNameBtn').addEventListener('click', addEntry);
        document.getElementById('addNameInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') addEntry();
        });
        document.getElementById('removeWinnerBtn').addEventListener('click', removeWinnerFromWheel);
        document.getElementById('dismissWinnerBtn').addEventListener('click', hideWinner);
        document.getElementById('winnerOverlay').addEventListener('click', function(e) {
            if (e.target === document.getElementById('winnerOverlay')) hideWinner();
        });

        entries = buildDefaultEntries(INITIAL_STUDENTS);
        window.addEventListener('resize', resizeCanvas);
        syncSidebar();
        resizeCanvas();
        updateSpinState();
    </script>
</body>
</html>
