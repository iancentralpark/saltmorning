<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#3b9edd">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Teacher sign in — Mr. Park</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=3">
    <link rel="apple-touch-icon-precomposed" sizes="180x180" href="/apple-touch-icon.png?v=3">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=3">
    <link rel="icon" type="image/png" sizes="180x180" href="/apple-touch-icon.png?v=3">
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png?v=3">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #3b9edd;
            --primary-dark: #2a8fc9;
            --accent: #ff9f43;
            --text: #2d3436;
            --muted: #636e72;
            --shadow: 0 6px 0 rgba(59, 158, 221, 0.1), 0 14px 32px rgba(59, 158, 221, 0.14);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Nunito', system-ui, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 14% 16%, rgba(255, 159, 67, 0.3), transparent 42%),
                radial-gradient(circle at 86% 12%, rgba(59, 158, 221, 0.28), transparent 40%),
                linear-gradient(180deg, #dff4ff 0%, #fff8e7 58%, #fef9ef 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: max(1.25rem, env(safe-area-inset-top)) 1rem max(1.5rem, env(safe-area-inset-bottom));
        }
        .card {
            width: min(400px, 100%);
            background: rgba(255, 255, 255, 0.94);
            border: 3px solid rgba(59, 158, 221, 0.28);
            border-radius: 24px;
            box-shadow: var(--shadow);
            padding: 1.75rem 1.5rem 1.5rem;
            text-align: center;
        }
        .icon {
            width: 72px;
            height: 72px;
            margin: 0 auto 1rem;
            border-radius: 22px;
            background: linear-gradient(135deg, #fff, #e8f6ff);
            border: 3px solid rgba(59, 158, 221, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: var(--primary-dark);
        }
        h1 {
            font-family: 'Fredoka', sans-serif;
            font-size: 1.65rem;
            margin: 0 0 0.35rem;
            color: var(--primary-dark);
        }
        p { margin: 0 0 1.25rem; color: var(--muted); font-size: 0.95rem; }
        input {
            width: 100%;
            border: 2px solid rgba(59, 158, 221, 0.25);
            border-radius: 14px;
            padding: 0.85rem 1rem;
            font-size: 1rem;
            font-family: inherit;
            margin-bottom: 0.75rem;
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 158, 221, 0.18);
        }
        .error {
            min-height: 1.25rem;
            color: #d63031;
            font-size: 0.88rem;
            margin-bottom: 0.5rem;
        }
        .btn {
            width: 100%;
            border: none;
            border-radius: 14px;
            padding: 0.9rem 1rem;
            font-family: 'Fredoka', sans-serif;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(135deg, #ff9f43, #ffb347);
            color: #fff;
            box-shadow: 0 4px 0 #e67e22;
        }
        .btn:disabled { opacity: 0.65; cursor: wait; }
        .back {
            display: inline-block;
            margin-top: 1rem;
            color: var(--muted);
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon" aria-hidden="true"><i class="fa-solid fa-chalkboard-user"></i></div>
        <h1>Teacher sign in</h1>
        <p>Enter the teacher password to open the class app.</p>
        <form id="loginForm">
            <input type="password" id="password" autocomplete="current-password" placeholder="Password" required>
            <div class="error" id="error" aria-live="polite"></div>
            <button type="submit" class="btn" id="submitBtn">Enter class app</button>
        </form>
        <a class="back" href="/"><i class="fa-solid fa-arrow-left"></i> Back to home</a>
    </div>
    <script>
    (function() {
        var TOKEN_KEY = 'mrpark_teacher_token';
        try { localStorage.removeItem(TOKEN_KEY); } catch (e) { /* ignore */ }
        var params = new URLSearchParams(location.search);
        var next = params.get('next') || '/class';
        if (next.indexOf('/teacher-login') === 0) next = '/class';

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var pw = document.getElementById('password').value;
            var btn = document.getElementById('submitBtn');
            var err = document.getElementById('error');
            err.textContent = '';
            btn.disabled = true;
            fetch(location.origin + '/api/teacher/login', {
                method: 'POST',
                credentials: 'same-origin',
                headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
                body: JSON.stringify({ password: pw })
            }).then(function(res) {
                return res.text().then(function(text) {
                    var data = {};
                    try { data = text ? JSON.parse(text) : {}; } catch (ex) { /* ignore */ }
                    if (!res.ok) throw new Error(data.error || 'Incorrect password.');
                    if (data.token) {
                        try { localStorage.setItem(TOKEN_KEY, data.token); } catch (ex) { /* ignore */ }
                    }
                    location.replace(next);
                });
            }).catch(function(ex) {
                err.textContent = ex.message || 'Could not sign in.';
            }).finally(function() {
                btn.disabled = false;
            });
        });
    })();
    </script>
</body>
</html>
