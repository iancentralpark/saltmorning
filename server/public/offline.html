<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline — Mr. Park</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Nunito, system-ui, sans-serif;
            background: linear-gradient(180deg, #dff4ff 0%, #fff8e7 100%);
            color: #2d3436;
            text-align: center;
            padding: 1.5rem;
        }
        .card {
            max-width: 360px;
            background: rgba(255,255,255,0.96);
            border: 3px solid rgba(59,158,221,0.35);
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 12px 32px rgba(59,158,221,0.12);
        }
        h1 { font-size: 1.35rem; margin: 0 0 0.5rem; color: #1e4a6e; }
        p { margin: 0 0 1rem; line-height: 1.5; color: #636e72; }
        a {
            display: inline-block;
            padding: 0.5rem 1.1rem;
            border-radius: 999px;
            background: #3b9edd;
            color: #fff;
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>You're offline</h1>
        <p>Check your connection, then try again. Cached tools may still work if you opened them before.</p>
        <a href="/">Go home</a>
    </div>
</body>
</html>
